<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expande Tu Futuro</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --gold2: #e8c96d; --bg: #060810; --card: rgba(255,255,255,.025); --border: rgba(255,255,255,.07); --text: #e0e0e0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
        .mono { font-family: 'Space Mono', monospace; }
        #app { max-width: 1600px; margin: 0 auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 15px; }
        #hdr { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
        #hdr-logo { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; }
        #hdr-title { font-size: 16px; font-weight: 800; }
        #hdr-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: 700; }
        .btn { padding: 8px 14px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .2s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: rgba(255,255,255,.05); border: 1px solid var(--border); color: #fff; }
        #hdr-search { margin-left: auto; display: flex; gap: 8px; }
        #symbolInput { background: #111; border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 8px; outline: none; }
        #main { display: grid; grid-template-columns: 240px 1fr; gap: 12px; }
        @media (max-width: 900px) { #main { grid-template-columns: 1fr; } }
        #sidebar { display: flex; flex-direction: column; gap: 12px; }
        #plotDiv { width: 100%; height: 600px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 11px; text-transform: uppercase; color: var(--gold); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,.02); font-size: 13px; }
        .asset-row { cursor: pointer; transition: background .2s; }
        .asset-row:hover { background: rgba(255,255,255,.02); }
        .fav-star { cursor: pointer; font-size: 16px; margin-right: 8px; transition: transform .1s; display: inline-block; }
        .fav-star.watching { color: var(--gold); }
        .fav-star.idle { color: rgba(255,255,255,.1); }
        #toasts { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #fff; box-shadow: 0 4px 12px rgba(0,0,0,.5); }
        .toast.info { background: #2196f3; }
        .toast.bullish { background: #00e676; color: #000; }
        .toast.bearish { background: #ff5252; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal { background: #0a0d18; border: 1px solid var(--gold); border-radius: 16px; width: 90%; max-width: 450px; padding: 25px; position: relative; }
    </style>
</head>
<body>
    <div id="app">
        <div id="hdr">
            <div id="hdr-logo"><img src="/static/logo.png" style="width:100%"></div>
            <div id="hdr-title"><span style="color:var(--gold)">E</span>XPANDE <span style="color:var(--gold)">T</span>U <span style="color:var(--gold)">F</span>UTURO</div>
            <div id="hdr-badge" class="card">FREE</div>
            <button class="btn btn-outline" onclick="openNotifModal()">🔔 Alertas</button>
            <button id="proBtn" class="btn btn-gold" onclick="openUpgradeModal()">👑 Planes PRO</button>
            <button class="btn btn-outline" onclick="handleLogout()" style="color:rgba(255,255,255,.4)">Salir</button>
            <div id="hdr-search">
                <input id="symbolInput" type="text" placeholder="AAPL, BTC-USD..." onkeydown="if(event.key==='Enter')doSearch()">
                <button class="btn btn-gold" onclick="doSearch()">Buscar</button>
            </div>
        </div>

        <div id="main">
            <div id="sidebar">
                <div class="card" id="price-card">
                    <div id="dispSym" style="color:var(--gold); font-weight:800; font-size:12px">--</div>
                    <div id="dispPrice" class="mono" style="font-size:24px; font-weight:700">--</div>
                    <div id="dispChange">--</div>
                    <button class="btn btn-outline" onclick="abrirTradingView()" style="width:100%; margin-top:10px; font-size:11px">📈 TradingView</button>
                </div>
                <div class="card">
                    <div style="font-size:11px; font-weight:800; margin-bottom:10px">⭐ VIGILANCIA</div>
                    <div id="watchList" style="font-size:12px; color:rgba(255,255,255,.4)">No hay activos vigilados</div>
                </div>
            </div>
            <div id="chart-card" class="card">
                <div id="plotDiv"></div>
            </div>
        </div>

        <div class="card" style="margin-top:12px; overflow-x:auto">
            <table>
                <thead>
                    <tr><th>★ Activo</th><th>Precio</th><th>Cambio</th><th>RSI</th><th>Acción</th></tr>
                </thead>
                <tbody id="assetsBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="notifModal" class="modal" style="display:none">
            <h3>🔔 Configurar Alertas</h3>
            <div style="margin:15px 0">
                <label>Telegram Chat ID:</label>
                <input id="tgId" type="text" style="width:100%; padding:8px; margin-top:5px; background:#111; border:1px solid #333; color:#fff">
            </div>
            <button class="btn btn-gold" onclick="savePrefs()" style="width:100%">Guardar</button>
            <button onclick="closeModals()" style="margin-top:10px; background:none; border:none; color:#fff; cursor:pointer">Cerrar</button>
        </div>
        <div id="upgradeModal" class="modal" style="display:none; text-align:center">
            <div style="font-size:40px">👑</div>
            <h2 style="color:var(--gold)">Planes PRO</h2>
            <p style="font-size:14px">Activa el modo profesional para alertas ilimitadas y TradingView.</p>
            <div style="background:rgba(201,168,76,.1); padding:15px; border-radius:10px; margin:20px 0">
                <input id="vipCodeInput" type="text" placeholder="Código VIP (ej: VIP333)" style="width:100%; padding:10px; background:#000; border:1px solid var(--gold); color:#fff; margin-bottom:10px">
                <button class="btn btn-gold" onclick="redeemVipCode()" style="width:100%">ACTIVAR AHORA</button>
            </div>
            <button onclick="closeModals()" style="background:none; border:none; color:rgba(255,255,255,.4); cursor:pointer">Cerrar</button>
        </div>
    </div>

    <div id="toasts"></div>

    <script>
        const ALL_ASSETS = [
            { t: '^GSPC', n: 'S&P 500' }, { t: '^NDX', n: 'Nasdaq 100' }, { t: 'BTC-USD', n: 'Bitcoin' },
            { t: 'ETH-USD', n: 'Ethereum' }, { t: 'AAPL', n: 'Apple' }, { t: 'NVDA', n: 'Nvidia' },
            { t: 'TSLA', n: 'Tesla' }, { t: 'AMZN', n: 'Amazon' }, { t: 'MSFT', n: 'Microsoft' }
        ];
        let currentSymbol = 'BTC-USD';
        let watchlist = new Set(JSON.parse(localStorage.getItem('etf_watchlist') || '[]'));
        window.isVip = false;

        function getUserId() {
            let id = localStorage.getItem('etf_user_id');
            if(!id) { id = 'u_' + Math.random().toString(36).slice(2, 10); localStorage.setItem('etf_user_id', id); }
            return id;
        }

        async function loadPrefs() {
            try {
                const r = await fetch('/api/notifications/prefs?user_id=' + getUserId());
                const d = await r.json();
                window.isVip = !!d.is_vip;
                document.getElementById('hdr-badge').innerText = window.isVip ? 'PRO' : 'FREE';
                if(window.isVip) document.getElementById('proBtn').style.display = 'none';
                updateUI();
            } catch(e) {}
        }

        async function fetchData(sym) {
            const r = await fetch('/api/chart/' + sym);
            return await r.json();
        }

        function renderChart(data) {
            const candles = data.chart.candles;
            const trace = {
                x: candles.map(c => new Date(c.x)),
                open: candles.map(c => c.o), high: candles.map(c => c.h),
                low: candles.map(c => c.l), close: candles.map(c => c.c),
                type: 'candlestick', name: currentSymbol
            };
            const layout = {
                plot_bgcolor: '#060810', paper_bgcolor: '#060810',
                font: { color: '#e0e0e0' }, margin: { t: 30, b: 30, l: 30, r: 30 },
                xaxis: { gridcolor: '#1a1a1a', rangeslider: { visible: false } },
                yaxis: { gridcolor: '#1a1a1a' }
            };
            Plotly.newPlot('plotDiv', [trace], layout);
        }

        async function loadSymbol(sym) {
            currentSymbol = sym;
            document.getElementById('dispSym').innerText = sym;
            const data = await fetchData(sym);
            if(data.error) return showToast(data.error, 'bearish');
            document.getElementById('dispPrice').innerText = data.last_price.toFixed(2);
            document.getElementById('dispChange').innerText = data.change_pct.toFixed(2) + '%';
            document.getElementById('dispChange').style.color = data.change_pct >= 0 ? '#00e676' : '#ff5252';
            renderChart(data);
        }

        function buildTable() {
            const body = document.getElementById('assetsBody');
            body.innerHTML = ALL_ASSETS.map(a => `
                <tr class="asset-row" onclick="loadSymbol('${a.t}')">
                    <td><span class="fav-star ${watchlist.has(a.t)?'watching':'idle'}" onclick="toggleWatch('${a.t}', event)">★</span>${a.t}</td>
                    <td id="p-${a.t}">--</td><td id="c-${a.t}">--</td><td id="r-${a.t}">--</td>
                    <td><button class="btn btn-outline" style="font-size:10px">Ver</button></td>
                </tr>
            `).join('');
        }

        function toggleWatch(t, e) {
            if(e) e.stopPropagation();
            if(watchlist.has(t)) {
                watchlist.delete(t);
                showToast("Eliminado de vigilancia", "info");
            } else {
                if(!window.isVip && watchlist.size >= 3) return openUpgradeModal();
                watchlist.add(t);
                showToast("⭐ Añadido a vigilancia", "bullish");
            }
            localStorage.setItem('etf_watchlist', JSON.stringify([...watchlist]));
            updateUI();
        }

        function updateUI() {
            buildTable();
            const list = document.getElementById('watchList');
            list.innerHTML = watchlist.size ? [...watchlist].map(t => `<div style="padding:4px; color:#fff">★ ${t}</div>`).join('') : 'No hay activos vigilados';
        }

        async function redeemVipCode() {
            const code = document.getElementById('vipCodeInput').value.trim();
            if(!code) return;
            const r = await fetch('/api/notifications/redeem?user_id=' + getUserId(), {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ code })
            });
            const d = await r.json();
            if(d.ok) { showToast(d.msg, "bullish"); setTimeout(() => location.reload(), 1000); }
            else showToast(d.error, "bearish");
        }

        function handleLogout() {
            if(confirm("¿Cerrar sesión? Se borrarán tus datos locales.")) {
                localStorage.clear();
                location.reload();
            }
        }

        function openUpgradeModal() { 
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('upgradeModal').style.display = 'block';
            document.getElementById('notifModal').style.display = 'none';
        }
        function openNotifModal() { 
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('notifModal').style.display = 'block';
            document.getElementById('upgradeModal').style.display = 'none';
        }
        function closeModals() { document.getElementById('modal-overlay').style.display = 'none'; }
        function showToast(m, n) {
            const t = document.createElement('div');
            t.className = 'toast ' + n; t.innerText = m;
            document.getElementById('toasts').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        function abrirTradingView() {
            if(!window.isVip) return openUpgradeModal();
            window.open('https://es.tradingview.com/chart/?symbol=' + currentSymbol, '_blank');
        }
        function doSearch() { const s = document.getElementById('symbolInput').value.trim().toUpperCase(); if(s) loadSymbol(s); }

        document.addEventListener('DOMContentLoaded', () => {
            loadPrefs();
            loadSymbol(currentSymbol);
        });
    </script>
</body>
</html>
